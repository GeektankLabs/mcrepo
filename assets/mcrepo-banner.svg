<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="300" viewBox="0 0 1400 300" role="img" aria-labelledby="title desc">
  <title id="title">mcrepo meta context banner</title>
  <desc id="desc">Landscape banner showing read, write, and sleep repository modes with a VS Code style project tree.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0b1020"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0b1221"/>
    </linearGradient>
    <linearGradient id="chipWrite" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="chipRead" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="chipSleep" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1400" height="300" fill="url(#bg)"/>
  <circle cx="1280" cy="40" r="130" fill="#22d3ee" opacity="0.07"/>
  <circle cx="200" cy="280" r="180" fill="#f97316" opacity="0.09"/>

  <g filter="url(#shadow)">
    <rect x="60" y="28" rx="16" ry="16" width="860" height="230" fill="url(#card)" stroke="#334155" stroke-width="1"/>
    <rect x="60" y="28" rx="16" ry="16" width="860" height="32" fill="#0b1328"/>
    <circle cx="86" cy="44" r="5" fill="#ef4444"/>
    <circle cx="105" cy="44" r="5" fill="#f59e0b"/>
    <circle cx="124" cy="44" r="5" fill="#22c55e"/>
    <text x="86" y="90" fill="#cbd5e1" font-size="15" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">repositories/</text>

    <text x="110" y="118" fill="#e2e8f0" font-size="14" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">✍️ API/</text>
    <text x="140" y="142" fill="#94a3b8" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">src/</text>
    <text x="140" y="162" fill="#94a3b8" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">tests/</text>

    <text x="110" y="188" fill="#e2e8f0" font-size="14" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">👀 Frontend/</text>
    <text x="140" y="212" fill="#94a3b8" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">components/</text>

    <text x="110" y="238" fill="#e2e8f0" font-size="14" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">💤 Middleware/</text>
    <text x="430" y="118" fill="#e2e8f0" font-size="14" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">👀 Documentation Website/</text>
    <text x="430" y="142" fill="#94a3b8" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">content/</text>
    <text x="430" y="188" fill="#e2e8f0" font-size="14" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">👀 Mobile App/</text>
    <text x="430" y="212" fill="#94a3b8" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">screens/</text>
  </g>

  <g transform="translate(820,28)">
    <rect x="0" y="0" width="460" height="54" rx="12" fill="#0b1328" stroke="#334155"/>
    <rect x="12" y="14" width="144" height="28" rx="14" fill="url(#chipWrite)"/>
    <text x="84" y="33" text-anchor="middle" fill="#1f2937" font-size="14" font-weight="700" font-family="Segoe UI, Helvetica, Arial, sans-serif">✍️ write</text>
    <rect x="164" y="14" width="136" height="28" rx="14" fill="url(#chipRead)"/>
    <text x="232" y="33" text-anchor="middle" fill="#06202a" font-size="14" font-weight="700" font-family="Segoe UI, Helvetica, Arial, sans-serif">👀 read</text>
    <rect x="308" y="14" width="140" height="28" rx="14" fill="url(#chipSleep)"/>
    <text x="378" y="33" text-anchor="middle" fill="#0f172a" font-size="14" font-weight="700" font-family="Segoe UI, Helvetica, Arial, sans-serif">💤 sleep</text>

    <rect x="0" y="87" width="460" height="46" rx="12" fill="#0b1328" stroke="#334155"/>
    <circle cx="28" cy="110" r="12" fill="#22d3ee"/>
    <text x="28" y="114" text-anchor="middle" fill="#082f49" font-size="10" font-weight="700" font-family="Segoe UI, Helvetica, Arial, sans-serif">OC</text>
    <text x="48" y="114" fill="#e2e8f0" font-size="13" font-family="Segoe UI, Helvetica, Arial, sans-serif">OpenCode</text>
    <circle cx="174" cy="110" r="12" fill="#f59e0b"/>
    <text x="174" y="114" text-anchor="middle" fill="#3f2300" font-size="10" font-weight="700" font-family="Segoe UI, Helvetica, Arial, sans-serif">CC</text>
    <text x="194" y="114" fill="#e2e8f0" font-size="13" font-family="Segoe UI, Helvetica, Arial, sans-serif">Claude Code</text>
    <circle cx="332" cy="110" r="12" fill="#60a5fa"/>
    <text x="332" y="114" text-anchor="middle" fill="#0c2c66" font-size="10" font-weight="700" font-family="Segoe UI, Helvetica, Arial, sans-serif">CP</text>
    <text x="352" y="114" fill="#e2e8f0" font-size="13" font-family="Segoe UI, Helvetica, Arial, sans-serif">Copilot</text>

    <rect x="0" y="166" width="460" height="64" rx="12" fill="#0b1328" stroke="#334155"/>
    <text x="18" y="204" fill="#e2e8f0" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">🛠 scripts</text>
    <text x="118" y="204" fill="#e2e8f0" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">🧾 docs</text>
    <text x="196" y="204" fill="#e2e8f0" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">🧪 tests</text>
    <text x="280" y="204" fill="#e2e8f0" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">🧩 contracts</text>
  </g>
</svg>
